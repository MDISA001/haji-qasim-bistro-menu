<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RESTORAN HAJI QASIM BISTRO</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="top-bar">
  <button onclick="toggleDarkMode()">
    🌙 Dark Mode
  </button>
</div>

<header class="hero">

  <img
    src="https://i.ibb.co/3ySV200W/IMG-1701.jpg"
    alt="Haji Qasim Bistro Logo"
    class="logo"
  >

  <h1>RESTORAN HAJI QASIM BISTRO</h1>

  <p class="tagline">
    Best Mamak Shop @ Shah Alam
  </p>

</header>

<div class="featured-section">

  <h2>⭐ Best Sellers</h2>

  <div class="featured-grid">

    <div class="featured-card">
      Nasi Goreng Kampung
    </div>

    <div class="featured-card">
      Teh Tarik
    </div>

    <div class="featured-card">
      Chicken Chop
    </div>

    <div class="featured-card">
      Naan Cheese
    </div>

    <div class="featured-card">
      Mee Goreng
    </div>

  </div>

</div>

<div class="search-section">

  <input
    type="text"
    id="searchInput"
    placeholder="🔍 Search Menu"
    onkeyup="render()"
  >

</div>

<div id="menu"></div>

<footer class="footer">

  <hr>

  <p>
    RESTORAN HAJI QASIM BISTRO
  </p>

  <p>
    Open 24 Hours
  </p>

  <p>
    Shah Alam, Selangor
  </p>

  <button
    class="admin-btn"
    onclick="showAdmin()"
  >
    Admin Login
  </button>

</footer>

<div
  id="adminPanel"
  style="display:none;"
>

  <hr>

  <h2>
    Admin Panel
  </h2>

  <div class="admin-form">

    <select id="itemCategory">

      <option value="Nasi">
        Nasi
      </option>

      <option value="Mee">
        Mee
      </option>

      <option value="Naan">
        Naan
      </option>

      <option value="Western">
        Western
      </option>

      <option value="Drinks">
        Drinks
      </option>

    </select>

    <input
      id="itemName"
      placeholder="Item Name"
    >

    <input
      id="itemPrice"
      placeholder="Price"
      type="number"
      step="0.01"
    >

    <button onclick="addItem()">
      Add Item
    </button>

  </div>

  <div id="adminList"></div>

</div>
